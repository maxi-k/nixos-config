$mod = SUPER
$terminal = alacritty

# ------
# Launchers & Terminals
# ------

bind = $mod SHIFT, Return, exec, $terminal

bind = $mod, P, exec, launcher
bind = $mod SHIFT, P, exec, COMBINED_MODI=drun,run launcher -show-icons
bind = $mod CTRL, P, exec, run-flatpak

# Open special programs
bind = $mod SHIFT, B, exec, $terminal -e "bluetoothctl"
bind = $mod SHIFT, C, exec, $terminal -e "python3"
bind = $mod SHIFT, E, exec, libreoffice --calc
bind = $mod SHIFT, O, exec, sh -c "select-recent-dir \"emacsclient -c\""
bind = $mod CTRL, S, exec, sh -c "tmux list-sessions | selector | awk -F: '{ print \$1 }' | xargs $terminal -e tmux new-session -A -s"

bind = $mod SHIFT, D, exec, sh -c "xdg-open ~"
bind = $mod SHIFT, F, exec, sh -c "cat ~/.cache/searches.log | selector | tee -a ~/.cache/searches.log | xargs -I'%s' firefox --search \"%s\""
bind = $mod SHIFT, V, exec, sh -c "awk '/^\\ +[a-zA-Z]/ && last {print substr(\$0,0,50),\"\\t\",last} {last=\"\"} /^[a-zA-Z]/{last=\$0}' ~/.config/sxhkd/sxhkdrc.bspwm | sed -E 's/^\\s+/\\t/' | column -t -s \$'\\t' | selector"

# Choose bspwm layout
bind = $mod SHIFT, Space, exec, bspwm-choose-layout apply
bind = $mod CTRL, Space, exec, bspwm-choose-layout once

# Cycle keyboard layout
bind = $mod, Space, exec, sh -c "x-cycle-layout && command -v notify-send && notify-send \"Cycled Layout\""

# Lock the screen
bind = $mod SHIFT, U, exec, sh -c "(lock & (xset dpms force off && systemctl suspend))"

# Audio Controls
bindl = , XF86AudioMute, exec, amixer sset Master toggle
bindl = , XF86AudioRaiseVolume, exec, amixer sset Master 5%+
bindl = , XF86AudioLowerVolume, exec, amixer sset Master 5%-

bindl = , XF86MonBrightnessUp, exec, brightnessctl s 10+
bindl = , XF86MonBrightnessDown, exec, brightnessctl s 10-

# Spotify media keys
bindl = , XF86AudioPlay, exec, sh -c "command -v playerctl && playerctl play || notify-send \"please install playerctl\""
bindl = , XF86AudioPause, exec, sh -c "command -v playerctl && playerctl pause || notify-send \"please install playerctl\""
bindl = , XF86AudioStop, exec, sh -c "command -v playerctl && playerctl stop || notify-send \"please install playerctl\""
bindl = , XF86AudioPrev, exec, sh -c "command -v playerctl && playerctl previous || notify-send \"please install playerctl\""
bindl = , XF86AudioNext, exec, sh -c "command -v playerctl && playerctl next || notify-send \"please install playerctl\""

# Restart sxhkd
bind = $mod, Delete, exec, sh -c "pkill -USR1 -x sxhkd && command -v notify-send && notify-send \"Reloaded keybindings\""
bind = $mod SHIFT, R, exec, sh -c "pkill -USR1 -x sxhkd && hyprctl reload && command -v notify-send && notify-send \"Reloaded wm and hotkeys\""
bind = $mod SHIFT, Delete, exec, hyprctl dispatch exit

bind = $mod, Q, exec, hyprctl dispatch killactive
bind = $mod SHIFT, Q, exec, hyprctl dispatch forcekillactive

bind = $mod, M, exec, hyprctl dispatch togglesplit

# Rotate current node 90 degrees
bind = $mod, O, exec, hyprctl dispatch layoutmsg rotate

# Rotate current node 90 degrees
bind = $mod SHIFT, O, exec, hyprctl dispatch layoutmsg rotate

# Swap the current node and the biggest node
bind = $mod, Return, exec, hyprctl dispatch layoutmsg swapwithmaster

#
# state/flags
#

# Set the window state
bind = $mod, Y, exec, hyprctl dispatch settiled
bind = $mod SHIFT, Y, exec, hyprctl dispatch pseudo
bind = $mod, G, exec, hyprctl dispatch setfloating
bind = $mod, F, exec, hyprctl dispatch fullscreen

bind = $mod SHIFT, S, exec, sh -c "choice=$(echo -e \"pin\\nlockgroups\" | selector); [ -n \"$choice\" ] && hyprctl dispatch \"$choice\""

bind = $mod SHIFT, period, exec, bspwm-scratch-program emacs-scratchpad
bind = $mod SHIFT, A, exec, sh -c "bspwm-scratch-program chatgpt-scratchpad \"\" \$(bspwm-get-proportionate-rectangle 60 60)"
bind = $mod SHIFT, M, exec, sh -c "bspwm-scratch-program \"webapp chat.mistral.ai\" \"\" \$(bspwm-get-proportionate-rectangle 60 60)"
bind = $mod SHIFT, G, exec, sh -c "bspwm-scratch-program \"webapp google.com\" \"\" \$(bspwm-get-proportionate-rectangle 60 60)"

bind = $mod CTRL, period, exec, bspwm-scratch-program
bind = $mod CTRL, comma, exec, hyprctl dispatch movetoworkspace special

#
# focus/swap/move
#

# Focus the node in the given direction
bind = $mod, H, exec, hyprctl dispatch movefocus l
bind = $mod, J, exec, hyprctl dispatch movefocus d
bind = $mod, K, exec, hyprctl dispatch movefocus u
bind = $mod, L, exec, hyprctl dispatch movefocus r

bind = $mod SHIFT, H, exec, hyprctl dispatch swapwindow l
bind = $mod SHIFT, J, exec, hyprctl dispatch swapwindow d
bind = $mod SHIFT, K, exec, hyprctl dispatch swapwindow u
bind = $mod SHIFT, L, exec, hyprctl dispatch swapwindow r

bind = $mod CTRL, H, exec, hyprctl dispatch movewindow l
bind = $mod CTRL, J, exec, hyprctl dispatch movewindow d
bind = $mod CTRL, K, exec, hyprctl dispatch movewindow u
bind = $mod CTRL, L, exec, hyprctl dispatch movewindow r

# Focus the node for the given path jump
bind = $mod, V, exec, hyprctl dispatch cyclenext
bind = $mod, B, exec, hyprctl dispatch cycleprev
bind = $mod, comma, exec, hyprctl dispatch swapnext
bind = $mod, period, exec, hyprctl dispatch swapprev

# Focus the next/previous desktop in the current monitor
bind = $mod, bracketleft, exec, hyprctl dispatch workspace e-1
bind = $mod, bracketright, exec, hyprctl dispatch workspace e+1

# Send the node to the monitor
bind = $mod, apostrophe, exec, hyprctl dispatch movewindowmon -1
bind = $mod, backslash, exec, hyprctl dispatch movewindowmon +1

# Focus the last node/desktop
bind = $mod, grave, exec, hyprctl dispatch focuscurrentorlast
bind = $mod, Tab, exec, hyprctl dispatch workspace previous

# Focus or send to the given desktop
bind = $mod, 1, exec, hyprctl dispatch workspace 1
bind = $mod, 2, exec, hyprctl dispatch workspace 2
bind = $mod, 3, exec, hyprctl dispatch workspace 3
bind = $mod, 4, exec, hyprctl dispatch workspace 4
bind = $mod, 5, exec, hyprctl dispatch workspace 5
bind = $mod, 6, exec, hyprctl dispatch workspace 6
bind = $mod, 7, exec, hyprctl dispatch workspace 7
bind = $mod, 8, exec, hyprctl dispatch workspace 8
bind = $mod, 9, exec, hyprctl dispatch workspace 9
bind = $mod, 0, exec, hyprctl dispatch workspace 10

bind = $mod SHIFT, 1, exec, hyprctl dispatch movetoworkspace 1
bind = $mod SHIFT, 2, exec, hyprctl dispatch movetoworkspace 2
bind = $mod SHIFT, 3, exec, hyprctl dispatch movetoworkspace 3
bind = $mod SHIFT, 4, exec, hyprctl dispatch movetoworkspace 4
bind = $mod SHIFT, 5, exec, hyprctl dispatch movetoworkspace 5
bind = $mod SHIFT, 6, exec, hyprctl dispatch movetoworkspace 6
bind = $mod SHIFT, 7, exec, hyprctl dispatch movetoworkspace 7
bind = $mod SHIFT, 8, exec, hyprctl dispatch movetoworkspace 8
bind = $mod SHIFT, 9, exec, hyprctl dispatch movetoworkspace 9
bind = $mod SHIFT, 0, exec, hyprctl dispatch movetoworkspace 10

#
# move/resize
#

# Expand a window by moving one of its side outward
bind = $mod ALT, H, exec, hyprctl dispatch resizeactive -20 0
bind = $mod ALT, J, exec, hyprctl dispatch resizeactive 0 20
bind = $mod ALT, K, exec, hyprctl dispatch resizeactive 0 -20
bind = $mod ALT, L, exec, hyprctl dispatch resizeactive 20 0

# Contract a window by moving one of its side inward
bind = $mod ALT SHIFT, H, exec, hyprctl dispatch resizeactive 20 0
bind = $mod ALT SHIFT, J, exec, hyprctl dispatch resizeactive 0 -20
bind = $mod ALT SHIFT, K, exec, hyprctl dispatch resizeactive 0 20
bind = $mod ALT SHIFT, L, exec, hyprctl dispatch resizeactive -20 0

# Move a floating window
bind = $mod, left, exec, hyprctl dispatch moveactive -20 0
bind = $mod, down, exec, hyprctl dispatch moveactive 0 20
bind = $mod, up, exec, hyprctl dispatch moveactive 0 -20
bind = $mod, right, exec, hyprctl dispatch moveactive 20 0

#
# tabs using suckless tabbed + tab.sh integration script
# adapted from https://www.reddit.com/r/bspwm/comments/etfm3m/for_those_who_like_tabs/
#

# Add focused window to a tabbed instance in given direction
bind = $mod, T, submap, tabbed

submap = tabbed
bind = , H, exec, sh -c "tabc.sh add \$(bspc query -N -n west) \$(bspc query -N -n focused)"
bind = , J, exec, sh -c "tabc.sh add \$(bspc query -N -n south) \$(bspc query -N -n focused)"
bind = , K, exec, sh -c "tabc.sh add \$(bspc query -N -n north) \$(bspc query -N -n focused)"
bind = , L, exec, sh -c "tabc.sh add \$(bspc query -N -n east) \$(bspc query -N -n focused)"

# Remove one tab from tabbed
bind = , R, exec, sh -c "tabbed=\$(bspc query -N -n focused); child=\$(tabc.sh list \$tabbed | head -n1); notify-send \"tabbed \$tabbed child \$child\"; tabc.sh remove \$tabbed \$child"

# Query bspwm information about the current (tabbed?) window
bind = , Q, exec, sh -c "notify-send \$(bspc query -T -n focused)"

# Wrap the current window in a tabbed instance
bind = , W, exec, sh -c "tabc.sh wrap \$(bspc query -N -n focused)"

# Spawn a new tabbed instance
bind = , S, exec, tabbed

bind = , escape, submap, reset
submap = reset
